<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Flux Agents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .lead-row { cursor: pointer; transition: background 0.2s; }
        .lead-row:hover { background-color: #f8f9fa !important; }
        .lead-active { background-color: #e9ecef !important; border-left: 4px solid #0d6efd !important; }
        .metric-card { border-radius: 12px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .event-input { border-left-color: #0dcaf0 !important; }
        .event-process { border-left-color: #ffc107 !important; }
        .event-output { border-left-color: #0d6efd !important; }
        .event-system { border-left-color: #dc3545 !important; }
        .event-booking { border-left-color: #198754 !important; }
        .log-card { border-radius: 8px; border: none; margin-bottom: 10px; border-left-width: 5px !important; }
        .category-badge { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px; }
        #logsList::-webkit-scrollbar { width: 5px; }
        #logsList::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        .intent-pill { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">FLUX AGENTS <span class="badge bg-primary ms-2" style="font-size: 0.6rem;">v1.6 Intent Engine</span></a>
            <button class="btn btn-sm btn-outline-light border-0" onclick="fetchData()">🔄 Sync</button>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Metrics Row -->
        <div class="row mb-4 text-center">
            <div class="col-md-4">
                <div class="card metric-card p-3 bg-white">
                    <small class="text-muted text-uppercase fw-bold" style="font-size: 0.7rem;">Inbound Leads</small>
                    <h2 id="metricLeads" class="mb-0 text-primary">-</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card metric-card p-3 bg-white">
                    <small class="text-muted text-uppercase fw-bold" style="font-size: 0.7rem;">AI Actions</small>
                    <h2 id="metricResponses" class="mb-0 text-success">-</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card metric-card p-3 bg-white">
                    <small class="text-muted text-uppercase fw-bold" style="font-size: 0.7rem;">Avg Speed</small>
                    <h2 id="metricSpeed" class="mb-0 text-warning">-</h2>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Left Side: Lead List -->
            <div class="col-md-5">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold mb-0">Leads Database</h5>
                    <button class="btn btn-sm btn-link text-decoration-none p-0" onclick="clearFilter()">View All Events</button>
                </div>
                <div class="card shadow-sm border-0" style="border-radius: 12px; overflow: hidden;">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr style="font-size: 0.8rem;">
                                    <th>Lead Info</th>
                                    <th>Classification</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="leadsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Side: Event Stream -->
            <div class="col-md-7">
                <div id="selectedLeadHeader" class="mb-3 d-none">
                    <div class="card bg-primary text-white border-0 shadow-sm p-3" style="border-radius: 12px;">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6 id="headerName" class="mb-0 fw-bold">...</h6>
                                <small id="headerEmail" class="opacity-75">...</small>
                            </div>
                            <div id="intentAnalysis" class="text-end">
                                <span class="badge bg-white text-primary mb-1">Intent Analysis</span><br>
                                <small id="headerIntent" class="fw-bold" style="font-size: 0.7rem;">Primary: -</small>
                            </div>
                        </div>
                        <hr class="my-2 opacity-25">
                        <div class="small">
                            <strong>Original Message:</strong><br>
                            <span id="headerMessage" class="fst-italic opacity-75">"..."</span>
                        </div>
                    </div>
                </div>

                <h5 class="fw-bold mb-3" id="streamTitle">Global Event Stream</h5>
                <div id="logsList" style="max-height: 700px; overflow-y: auto; padding-right: 10px;"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedLeadId = null;
        let allLogs = [];
        let allLeads = [];

        async function fetchData() {
            try {
                // Stats
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                document.getElementById('metricLeads').innerText = stats.totalLeads;
                document.getElementById('metricResponses').innerText = stats.totalResponses;
                document.getElementById('metricSpeed').innerText = stats.avgResponseTime;

                // Leads
                const leadsRes = await fetch('/api/leads');
                allLeads = await leadsRes.json();
                const leadsTable = document.getElementById('leadsTable');
                
                leadsTable.innerHTML = allLeads.map(l => `
                    <tr class="lead-row ${selectedLeadId == l.id ? 'lead-active' : ''}" onclick="filterByLead(${l.id})">
                        <td>
                            <div class="fw-bold" style="font-size: 0.85rem;">${l.name}</div>
                            <div class="text-muted" style="font-size: 0.7rem;">${l.email}</div>
                        </td>
                        <td>
                            ${l.intent ? `
                                <div class="badge bg-light text-dark border intent-pill">${l.intent}</div>
                                <div class="text-muted" style="font-size: 0.6rem;">Conf: ${Math.round(l.intent_confidence * 100)}%</div>
                            ` : '<small class="text-muted">Pending...</small>'}
                        </td>
                        <td>
                            <span class="badge ${l.status === 'New' ? 'bg-info' : 'bg-success'} rounded-pill" style="font-size: 0.65rem;">${l.status}</span>
                        </td>
                    </tr>
                `).join('');

                // Logs
                const logsRes = await fetch('/api/logs');
                allLogs = await logsRes.json();
                renderLogs();
                updateHeader();
            } catch (err) {
                console.error("Dashboard Poll Error:", err);
            }
        }

        function renderLogs() {
            const logsList = document.getElementById('logsList');
            const filteredLogs = selectedLeadId ? allLogs.filter(l => l.lead_id == selectedLeadId) : allLogs;
            
            if (filteredLogs.length === 0) {
                logsList.innerHTML = '<div class="text-center p-5 text-muted border rounded bg-white">Waiting for system events...</div>';
                return;
            }

            logsList.innerHTML = filteredLogs.map(l => {
                let detailsHtml = '';
                let borderClass = 'event-process';
                let badgeClass = 'bg-warning text-dark';
                let category = 'Process';

                if (l.step === 'LEAD_STORED') {
                    borderClass = 'event-input';
                    badgeClass = 'bg-info text-dark';
                    category = 'Input';
                } else if (l.step === 'INTENT_CLASSIFIED' || l.step === 'ROUTING') {
                    borderClass = 'event-process';
                    badgeClass = 'bg-secondary text-white';
                    category = 'Router';
                } else if (l.step === 'OUTPUT_PROPOSED') {
                    borderClass = 'event-process';
                    badgeClass = 'bg-warning text-dark';
                    category = 'Proposal';
                } else if (l.step === 'COORDINATION_STARTED' || l.step === 'FINAL_RESPONSE_COMPOSED') {
                    borderClass = 'event-output';
                    badgeClass = 'bg-dark text-white';
                    category = 'Coordinator';
                    
                    if (l.step === 'FINAL_RESPONSE_COMPOSED') {
                        try {
                            const d = JSON.parse(l.details);
                            detailsHtml = `<div class="mt-2 p-2 bg-dark text-white small rounded shadow-sm border-start border-light border-4">
                                <div class="fw-bold" style="font-size: 0.7rem;">UNIFIED FINAL MESSAGE</div>
                                <div class="fst-italic">"${d.message}"</div>
                            </div>`;
                        } catch(e) {}
                    }
                } else if (l.step === 'ERROR') {
                    borderClass = 'event-system';
                    badgeClass = 'bg-danger';
                    category = 'System';
                } else if (l.step === 'TOOL_EXECUTED' || l.step === 'AVAILABILITY_CHECKED' || l.step === 'BOOKING_CREATED') {
                    borderClass = l.step === 'TOOL_EXECUTED' ? 'event-output' : 'event-booking';
                    badgeClass = l.step === 'TOOL_EXECUTED' ? 'bg-primary' : 'bg-success';
                    category = l.step === 'TOOL_EXECUTED' ? 'Output' : 'Booking';
                    
                    try {
                        const d = JSON.parse(l.details);
                        const res = d.result;
                        if (res && res.type === 'sms') {
                            detailsHtml = `<div class="mt-2 p-2 bg-light border-start border-primary border-4 small rounded shadow-sm">
                                <div class="text-primary fw-bold" style="font-size: 0.7rem;">OUTGOING SMS -> ${res.recipient}</div>
                                <div class="fst-italic text-dark">"${res.message}"</div>
                            </div>`;
                        } else if (res && res.type === 'availability') {
                            detailsHtml = `<div class="mt-2 p-2 bg-light border-start border-success border-4 small rounded shadow-sm">
                                <div class="text-success fw-bold" style="font-size: 0.7rem;">AVAILABILITY CHECKED</div>
                                <div class="text-dark">Found slots: ${res.slots.map(s => new Date(s).toLocaleTimeString()).join(', ')}</div>
                            </div>`;
                        } else if (res && res.type === 'booking') {
                            detailsHtml = `<div class="mt-2 p-2 bg-success text-white border-start border-dark border-4 small rounded shadow-sm">
                                <div class="fw-bold" style="font-size: 0.7rem;">BOOKING CONFIRMED</div>
                                <div>Time: ${new Date(res.startTime).toLocaleString()}</div>
                            </div>`;
                        } else if (typeof res === 'string') {
                             detailsHtml = `<div class="mt-2 p-2 bg-light border-start border-primary border-4 small rounded fst-italic">${res}</div>`;
                        }
                    } catch(e) {}
                }

                return `
                <div class="card log-card shadow-sm ${borderClass}">
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-between align-items-start mb-1">
                            <div>
                                <span class="badge ${badgeClass} category-badge">${category}</span>
                                <span class="ms-1 fw-bold small text-dark">${l.step}</span>
                            </div>
                            <small class="text-muted" style="font-size: 0.7rem;">${new Date(l.created_at).toLocaleTimeString()}</small>
                        </div>
                        <div class="text-secondary mb-1" style="font-size: 0.85rem;">${l.message}</div>
                        ${detailsHtml}
                        <div class="d-flex justify-content-between align-items-center mt-2 opacity-75">
                            <small class="text-muted" style="font-size: 0.65rem;">ID: lead_${l.lead_id}</small>
                            <span class="text-muted" style="font-size: 0.65rem;">⚡ ${(() => {
                                try {
                                    const d = JSON.parse(l.details);
                                    return d.duration || '0.5s';
                                } catch(e) { return '0.5s'; }
                            })()}</span>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function updateHeader() {
            const header = document.getElementById('selectedLeadHeader');
            const title = document.getElementById('streamTitle');
            if (selectedLeadId) {
                const lead = allLeads.find(l => l.id == selectedLeadId);
                if (lead) {
                    header.classList.remove('d-none');
                    document.getElementById('headerName').innerText = lead.name;
                    document.getElementById('headerEmail').innerText = lead.email;
                    document.getElementById('headerMessage').innerText = `"${lead.message}"`;
                    document.getElementById('headerIntent').innerText = `Primary: ${lead.intent || 'Unknown'} (${Math.round((lead.intent_confidence || 0) * 100)}%)`;
                    title.innerText = "Lead Journey History";
                }
            } else {
                header.classList.add('d-none');
                title.innerText = "Global Event Stream";
            }
        }

        function filterByLead(id) {
            selectedLeadId = id;
            fetchData();
        }

        function clearFilter() {
            selectedLeadId = null;
            fetchData();
        }

        fetchData();
        setInterval(fetchData, 4000);
    </script>
</body>
</html>
