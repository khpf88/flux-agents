<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Flux Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-4">Contact Flux Solutions</h2>
            <form id="leadForm">
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-label form-control" id="name" required placeholder="John Doe">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-label form-control" id="email" required placeholder="john@example.com">
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" class="form-label form-control" id="phone" required placeholder="+1234567890">
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-label form-control" id="message" rows="3" placeholder="How can we help?"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Send Message</button>
            </form>
            <div id="responseMsg" class="mt-3 text-center"></div>
        </div>
    </div>

    <script>
        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const responseMsg = document.getElementById('responseMsg');
            responseMsg.innerHTML = 'Sending...';

            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch('/api/leads', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                console.log('API Response:', result);

                if (response.ok) {
                    responseMsg.innerHTML = '<div class="alert alert-success">Thanks! We will contact you shortly.</div>';
                    document.getElementById('leadForm').reset();
                } else {
                    if (result.details && result.details.length > 0) {
                        const errors = result.details.map(d => {
                            const field = d.path[0].charAt(0).toUpperCase() + d.path[0].slice(1);
                            return `<li><strong>${field}:</strong> ${d.message}</li>`;
                        }).join('');
                        responseMsg.innerHTML = `<div class="alert alert-danger">Please fix the following errors:<ul>${errors}</ul></div>`;
                    } else {
                        responseMsg.innerHTML = `<div class="alert alert-danger">${result.error || 'Error submitting form.'}</div>`;
                    }
                }
            } catch (error) {
                responseMsg.innerHTML = '<div class="alert alert-danger">Network error.</div>';
            }
        });
    </script>
</body>
</html>
